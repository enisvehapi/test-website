name: Deploy to Container 101

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Proxmox container
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROXMOX_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html"
          target: "/tmp/"

      - name: Restart nginx in container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROXMOX_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            pct push 101 /tmp/index.html /var/www/html/index.html
            pct exec 101 -- systemctl restart nginx
            echo "Deployed successfully at $(date)"
